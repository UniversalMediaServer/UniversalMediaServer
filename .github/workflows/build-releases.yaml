  macos-arm:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Set jrePath to default Java 17
        id: paths
        run: echo "jrePath=$JAVA_HOME_17_arm64" >> "$GITHUB_OUTPUT"
      # - name: Set up JRE
      #   uses: actions/setup-java@v5
      #   with:
      #     distribution: 'liberica'
      #     java-version: 17
      #     java-package: jre
      # - name: Set up JDK
      #   uses: actions/setup-java@v5
      #   with:
      #     distribution: 'liberica'
      #     java-version: 17
      - name: Extract tag
        run: echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_ENV
      - name: Write specific Java version to Maven pom config
        uses: richardrigutins/replace-in-files@v3.0.0
        with:
          files: '**/pom.xml'
          search-text: 'JAVA_PATH_CI'
          replacement-text: ${{ steps.paths.outputs.jrePath }}
      - name: Build package
        run: mvn -P macos-arm-ci package -DskipTests=true
      - name: Write tag to Gon configs
        uses: richardrigutins/replace-in-files@v3.0.0
        with:
          files: './.github/workflows/dependencies/gon-config-*.json'
          search-text: 'VERSION_TAG'
          replacement-text: ${{ env.TAG }}
      - name: Write password to Gon configs
        uses: richardrigutins/replace-in-files@v3.0.0
        with:
          files: './.github/workflows/dependencies/gon-config-*.json'
          search-text: 'APPLE_PASSWORD'
          replacement-text: ${{secrets.APPLE_PASSWORD}}
      - name: Import codesign cert
        uses: apple-actions/import-codesign-certs@v7
        with: 
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
      - name: Run pre-build signing step
        run: ./.github/workflows/dependencies/gon ./.github/workflows/dependencies/gon-config-prebuild-arm.json
      - name: Run post-build signing step
        run: ./.github/workflows/dependencies/gon ./.github/workflows/dependencies/gon-config-build-arm.json || true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-builds
          path: '**/*.dmg'

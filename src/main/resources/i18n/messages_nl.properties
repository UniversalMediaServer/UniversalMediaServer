ToUseFontMustBeRegistered=<html>Om dit te gebruiken moet het lettertype in het besturingssysteem geregistreerd zijn.<br>Om een lettertype toe te passen, moet de lettertypenaam of het lettertypebestand opgegeven worden.<br>In het Windows-besturingssysteem moet het lettertypebestand geplaatst worden in de map "Windows\\Fonts".<br>Windows 10 gebruikers kunnen op de rechtermuisknop klikken op het lettertypebestand en "Installeren" kiezen.<br>Bij andere besturingssystemen moet het lettertypebestand ook in de lettertypemap worden geplaatst of de specifieke methode<br>worden gebruikt om het in het besturingssysteem te registreren.<br>Als het lettertype niet correct is opgegeven of niet is geregistreerd in het besturingssysteem, wordt het standaardlettertype gebruikt.</html>

WhenEnabledDoNotTrancode=<html><strong>Standaard:</strong> False<br><strong>Notities:</strong> Indien ingeschakeld, zal UMS onder geen enkele omstandigheid transcoderen.<br>Dit betekent waarschijnlijk dat je speler niet veel bestanden zal kunnen afspelen of geen ondertitels zal tonen, maar er zijn gevallen waar dat nog altijd de voorkeur heeft.</html>
WhenEnabledMuxesDvd=<html><strong>Standaard:</strong> Ingeschakeld<br><strong>Toelichting:</strong> Als dit is ingeschakeld, worden dvd-videotracks gemuxed in plaats van getranscodeerd.</html>
WhenEnabledPartiallyWatchVideo=<html><strong>Standaard:</strong> Ingeschakeld<br><strong>Toelichting:</strong> Als dit is ingeschakeld, zal als u een video gedeeltelijk heeft bekeken en daarna UMS opnieuw opstart,<br>een nieuw virtueel bestand worden aangemaakt die samen met uw originele bestand wordt weergegeven in de bestandenlijst op uw speler.<br>Afspelen van dit nieuwe bestand zal beginnen waar u gestopt was met afspelen, terwijl bij het afspelen van het niet-hervatbestand zoals normaal vanaf het begin van de video wordt gestart.<br><br>Het is normaal dat de video tot maximaal 20 seconden vroeger opstart dan dat u was gestopt.</html>
WhenEnabledUmsProfileName=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Toelichting:</strong> Als dit is ingeschakeld, wordt de UMS-profielnaam (standaard de hostnaam van uw computer)<br>toegevoegd aan de naam van de server wanneer deze wordt weergegeven op de speler.</html>
WhenSettingDisabledFfmpeg=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Toelichting:</strong> Als dit is uitgeschakeld, wordt FFmpeg gebruikt voor het genereren van miniaturen.<br>MPlayer maakt miniaturen met een juiste beeldverhouding (FFmpeg miniaturen zijn altijd breedbeeldformaat) maar kan iets langzamer zijn.</html>

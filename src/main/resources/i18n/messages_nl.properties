TheNumberGpuThreads=<html><strong>Standaard:</strong> "1"<br><strong>Notities:</strong> Het aantal GPU-threads dat moet worden gebruikt bij het decoderen van video.<br>Andere waarden dan "1" kunnen onstabiel zijn of FFmpeg kan stoppen vanwege fouten.<br>0 laat FFmpeg automatisch kiezen.</html>
TheProgramWillCloseNoFiles=Het programma wordt opnieuw opgestart en er zullen geen bestanden in de mediabibliotheek zijn totdat het opstart scannen plaatsvindt
TheServerHasToRestarted=De server moet opnieuw worden gestart vanwege een configuratie-wijziging
TheXExecutableNotDefined=De %s executable is niet gedefinieerd.
ThenStartServiceWindows=en daarna de service starten (en configureren) vanuit het Windows Systeembeheer->Services venster.\n\n
ThereIsProblemTranscodingEngineX=Er is een probleem met transcoding engine %s
ThisClosesApp=Dit sluit de applicatie.
ThisControlsUmsScanShared=<html><strong>Systeemwaarde:</strong> true<br><br>Dit bepaalt of UMS bij het opstarten de gedeelde mappen scant.<br>Dit wordt sterk aanbevolen, want zo blijft de mediabibliotheek actueel.</html>
ThisControlsWhetherUmsTry=<html><strong>Standaard:</strong> Ingeschakeld<br><strong>Toelichting:</strong> Dit bepaalt of UMS zal proberen om toegang te krijgen tot een extern netwerk zoals het internet.</html>
ThisEngineNotLoaded=Deze engine is niet geladen!
ThisFeatureVeryCpuintensive=Deze functie gebruikt veel CPU-rekenkracht en werkt daardoor mogelijk traag.\nU kunt het sneller laten werken door gebruik te maken van de multi-threading optie op deze pagina.
ThisLaunchesOurWebSettings=Dit start onze webinstellingen in uw standaardbrowser
ThisMakesBrowsingSlower=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Opmerking:</strong> Dit maakt het browsen langzamer.</html>
ThisMayIncreaseAudioQuality=<html><strong>standaard:</strong>fout<br><strong>notities:</strong>Dit kan de audiokwaliteit vergroten als de resampling voltooid is.</html>
ThisOptionLossless=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Toelichting:</strong> Deze instelling is lossless.</html>
ThisOptionLosslessNotBest=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Toelichting:</strong> Deze instelling is lossless, maar is wellicht niet de beste keuze voor draadloze verbindingen vanwege de hoge bitrate.</html>
ThisOptionLosslessUnstable=<html><strong>Standaard:</strong> Uitgeschakeld<br><strong>Toelichting:</strong> Deze instelling is lossless maar <strong>kan onstabiel zijn</strong> op sommige apparaten.<br>Om het te kunnen gebruiken, moet uw versterker DTS ondersteunen en aangesloten zijn met een optische of HDMI-kabel.</html>
ThisOptionLosslessVeryStable=<html><strong>Standaard:</strong> Ingeschakeld<br><strong>Toelichting:</strong> Deze instelling is lossless en is zeer stabiel. Maar als de audio niet synchroon loopt met de video of schokkerig klinkt,<br>dan kan het uitschakelen van deze optie helpen.</html>
ThisOverridesRendererConfiguration=<html><strong>Opmerking:</strong> Dit heeft voorrang op de configuratie van de speler. Het dient alleen te worden gebruikt voor het oplossen van problemen wanneer u niet de configuratie van de speler kunt bewerken.</html>
ThisRestartsMediaServices=Dit herstart de media service, niet de toepassing
ThisShutDownComputer=Dit zal de computer die UMS draait, sluiten.
ThisStopsRestartsApp=Dit stopt en start de applicatie opnieuw.
ThisWillRemoveXFolders=Dit zal %d mappen verwijderen. Weet je het zeker?

#----------------------------------------------------------------------------
# Profile for playback inside a web browser (Chrome / Chromium / Edge).
#
# Based on DefaultRenderer.conf
# See DefaultRenderer.conf for a description of all possible configuration options.
#
# This profile is used when audio is played back directly in the browser via an
# HTML5 <audio> element.
#
# Only audio is handled here; the browser player does not request video or images
# from UMS.
#

#-----------------------------------------------------------------------------
# RENDERER INFORMATION
#

RendererName = NextCP/2 Web Player
RendererIcon = nextcp2.svg

#-----------------------------------------------------------------------------
# RENDERER RECOGNITION
#

UserAgentSearch = next_cp_webplayer

#-----------------------------------------------------------------------------
# BASIC CAPABILITIES
#

# Image is kept enabled so that album-art thumbnails, which the browser fetches
# directly from UMS (also resolving to this profile by IP), are still served.
Video = false
Audio = true
Image = true

#-----------------------------------------------------------------------------
# DLNA SETTINGS
#

# The browser seeks with HTTP byte ranges, not DLNA seek-by-time.
SeekByTime = false

#-----------------------------------------------------------------------------
# MEDIAINFO
#

MediaInfo = true

#-----------------------------------------------------------------------------
# TRANSCODING AND MUXING CAPABILITIES
#

TranscodeAudio = MP3

#-----------------------------------------------------------------------------
# SUPPORTED MEDIA FORMATS
#
# Only formats natively decodable by modern Chromium-based browsers are streamed
# directly; everything else falls through to the MP3 transcoder above.
#

Supported = f:mp3|mp2|mpa                                      m:audio/mpeg
Supported = f:m4a               a:aac-lc|he-aac|aac-main       m:audio/mp4
Supported = f:aac|adts          a:aac-lc|he-aac                m:audio/aac
Supported = f:flac                                             m:audio/flac
Supported = f:wav               a:adpcm|lpcm                   m:audio/wav
Supported = f:oga|ogg           a:vorbis                       m:audio/ogg
Supported = f:oga|ogg|opus      a:opus                         m:audio/ogg
Supported = f:weba              a:opus|vorbis                  m:audio/webm
